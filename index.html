<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharaf Uddin Official</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#020617,#0b1020,#020617);
  color:white;
  overflow-y:auto;
}

/* glow bg */
.bg-glow{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 20% 30%, rgba(0,255,255,0.25), transparent 50%),
             radial-gradient(circle at 80% 70%, rgba(0,140,255,0.25), transparent 50%);
  filter:blur(70px);
  z-index:0;
}

/* snow */
.snow{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

.snow span{
  position:absolute;
  font-size:18px;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10vh);}
  100%{transform:translateY(110vh);}
}

/* container */
.container{
  position:relative;
  z-index:5;
  width:92%;
  max-width:420px;
  margin:40px auto;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
  border:1px solid cyan;
  text-align:center;
}

/* TOP LOGO */
.logo img{
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid cyan;
  box-shadow:0 0 20px cyan;
}

/* name */
h2{
  margin-top:10px;
  font-size:22px;
  color:cyan;
}

/* subtitle */
.sub{
  font-size:13px;
  color:#9efcff;
  margin-top:5px;
}

/* icons */
.icons{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:18px 0;
  flex-wrap:wrap;
}

.icon{
  width:52px;
  height:52px;
  border-radius:50%;
  background:#00000055;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid cyan;
  box-shadow:0 0 10px cyan;
}

.icon img{
  width:28px;
  height:28px;
}

/* buttons */
.btn-row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:15px;
  font-weight:bold;
  background:cyan;
  cursor:pointer;
}

.bottom{
  margin-top:15px;
  font-size:13px;
  color:#00ff99;
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<!-- MUSIC -->
<audio id="bgmusic" loop>
  <source src="https://raw.githubusercontent.com/mdshahavuddinm904/my-website/main/ssstik.io_1777217719241.mp3">
</audio>

<!-- CLICK SOUND -->
<audio id="clickSound">
  <source src="https://www.myinstants.com/media/sounds/mouse-click.mp3">
</audio>

<div class="container">

<!-- TOP LOGO -->
<div class="logo">
  <img src="https://i.postimg.cc/ZK4x3VmK/IMG-20260501-233713-202.jpg">
</div>

<h2>Sharaf Uddin Official</h2>
<div class="sub">🕌 Alhamdulillah Always</div>

<!-- SOCIAL ICONS -->
<div class="icons">

  <!-- Facebook -->
  <a class="icon" href="https://www.facebook.com/" target="_blank" onclick="clickSnd()">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
  </a>

  <!-- TikTok -->
  <a class="icon" href="https://www.tiktok.com/" target="_blank" onclick="clickSnd()">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
  </a>

  <!-- Instagram -->
  <a class="icon" href="https://www.instagram.com/" target="_blank" onclick="clickSnd()">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
  </a>

  <!-- Telegram (NEW IMAGE) -->
  <a class="icon" href="https://t.me/+75BQ2Qw9UZI4OTM1" target="_blank" onclick="clickSnd()">
    <img src="https://i.postimg.cc/ZK4x3VmK/IMG-20260501-233713-202.jpg">
  </a>

  <!-- NEXT BUTTON (NEW IMAGE) -->
  <a class="icon" href="https://t.me/Global_Method_Channel" target="_blank" onclick="clickSnd()">
    <img src="https://i.postimg.cc/7YK0z4Xb/IMG-20260501-233844-851.jpg">
  </a>

</div>

<!-- BUTTONS -->
<div class="btn-row">
  <button class="btn" onclick="toggleMusic(); clickSnd()">🎵 Music</button>
</div>

<!-- TEXT -->
<div class="bottom" id="typing"></div>

</div>

<script>

/* sound */
function clickSnd(){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
}

/* snow */
const snow=document.createElement("div");
document.body.appendChild(snow);

function drop(){
  let s=document.createElement("span");
  s.innerHTML="❄️";
  s.style.position="absolute";
  s.style.left=Math.random()*100+"vw";
  s.style.animation="fall 3s linear";
  snow.appendChild(s);
  setTimeout(()=>s.remove(),3000);
}
setInterval(drop,100);

/* music */
let music=document.getElementById("bgmusic");
let play=false;

function toggleMusic(){
  if(!play){
    music.play();
    play=true;
  }else{
    music.pause();
    play=false;
  }
}

/* typing */
let text="👋 Hey Welcome to my Bio Website 🌐✨\n💙 Sharaf Uddin Official\n🕌 Alhamdulillah Always";
let i=0;
function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,40);
  }
}
type();

</script>

</body>
</html>
