  width:44px;
  height:44px;
  border-radius:50%;
}

.btn-row{display:flex;gap:12px;}

.btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:20px;

  margin-top:18px;

<body>

<audio id="bgmusic" loop>
  <source src="https://raw.githubusercontent.com/mdshahavuddinm904/my-website/main/ssstik.io_1777217719241.mp3">
</audio>

<div class="container">

  <div class="logo">
    <img src="https://i.postimg.cc/ZK4x3VmK/IMG-20260501-233713-202.jpg">
  </div>

  <h2>Sharaf Uddin Official</h2>
  <div class="sub">🕌 Alhamdulillah Always</div>

  <div class="icons">
    <a class="icon" href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
    <a class="icon" href="#"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"></a>
    <a class="icon" href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"></a>
    <a class="icon" href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
  </div>

  <div class="btn-row">
    <button class="btn" onclick="toggleMusic()">🎵 Music</button>
    <button class="btn" id="timeBtn">⏰ Time</button>
  </div>

  <div class="bottom" id="typing"></div>

</div>

<script>

let music=document.getElementById("bgmusic");
let play=false;

function toggleMusic(){
  if(!play){
    music.play();
    play=true;
  }else{
    music.pause();
    play=false;
  }
}

function updateTime(){
  let now=new Date();
  document.getElementById("timeBtn").innerHTML="⏰ "+now.toLocaleTimeString();
}
setInterval(updateTime,1000);

let text =
"👋 Hey Welcome to my Bio Website 🌐✨\n\n" +
"💙 My Name: Sharaf Uddin\n" +
"🎂 Age: 20+\n" +
"💼 Work: Forex & Binary Trading 📊💹\n" +
"🚀 Goal: Online Business & Financial Freedom 💰🔥\n\n" +
"🙏 Thanks for visiting my profile 💙✨\n\n" +
"📩 এমন ওয়েবসাইট বানাতে চাইলে অবশ্যই টেলিগ্রামে মেসেজ দিন\n" +
"🙏 ধন্যবাদ 💙✨\n\n" +
"🎁 সম্পূর্ণ ফ্রিতে এই ধরনের ওয়েবসাইট বানিয়ে দেওয়া হবে\n" +
"⚠️ তবে শর্ত আছে:\n" +
"👉 আমাদের চ্যানেলটি ৫ জনকে শেয়ার করে দিতে হবে 🔗📢\n" +
"😊 ধন্যবাদ 💙";

let i=0;
function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,35);
  }
}
type();

</script>
