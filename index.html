<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharaf Uddin Official</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#020617,#0b1020,#020617);
  color:white;
  overflow-y:auto;
  overflow-x:hidden;
}

.bg-glow{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 20% 30%, rgba(0,255,255,0.25), transparent 50%),
             radial-gradient(circle at 80% 70%, rgba(0,140,255,0.25), transparent 50%);
  filter:blur(70px);
  z-index:0;
  animation:bgmove 6s infinite alternate;
}

@keyframes bgmove{
  0%{transform:scale(1);}
  100%{transform:scale(1.2);}
}

.snow{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

.snow span{
  position:absolute;
  font-size:18px;
  animation:fall linear infinite;
  opacity:0.9;
}

@keyframes fall{
  0%{transform:translateY(-10vh);}
  100%{transform:translateY(110vh);}
}

.container{
  position:relative;
  z-index:5;
  width:92%;
  max-width:420px;
  margin:40px auto;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
  border:1px solid rgba(0,255,255,0.3);
  box-shadow:0 0 25px rgba(0,255,255,0.25);
  text-align:center;
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.logo img{
  width:105px;
  height:105px;
  border-radius:50%;
  border:4px solid cyan;
  box-shadow:0 0 15px cyan,0 0 35px cyan;
  margin-bottom:12px;
}

h2{
  font-size:24px;
  font-weight:700;
  background:linear-gradient(90deg,cyan,#00ff99,#0099ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shake 2s infinite;
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(2px);}
  50%{transform:translateX(-2px);}
  75%{transform:translateX(2px);}
  100%{transform:translateX(0);}
}

.sub{
  margin-top:5px;
  font-size:13px;
  color:#9efcff;
  opacity:0.9;
}

.icons{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:18px 0;
  flex-wrap:wrap;
}

.icon{
  width:50px;
  height:50px;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid rgba(0,255,255,0.4);
  box-shadow:0 0 15px rgba(0,255,255,0.4);
  transition:0.3s;
}

.icon img{
  width:44px;
  height:44px;
  object-fit:cover;
  border-radius:50%;
  filter:drop-shadow(0 0 15px cyan);
}

.btn-row{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:10px;
}

.btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-size:14px;
  font-weight:700;
  background:linear-gradient(90deg,cyan,#00ff99);
  color:#000;
  box-shadow:0 0 15px rgba(0,255,255,0.6);
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px cyan,0 0 50px cyan;
}

.btn:active{
  transform:scale(1.15);
}

.bottom{
  margin-top:18px;
  padding:14px;
  border-radius:18px;
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(0,255,255,0.2);
  font-size:13px;
  line-height:1.7;
  color:#00ff99;
  white-space:pre-line;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

::-webkit-scrollbar{
  width:6px;
}
::-webkit-scrollbar-thumb{
  background:cyan;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<audio id="bgmusic" loop>
  <source src="https://raw.githubusercontent.com/mdshahavuddinm904/my-website/main/ssstik.io_1777217719241.mp3">
</audio>

<audio id="clickSound">
  <source src="https://www.myinstants.com/media/sounds/mouse-click.mp3">
</audio>

<div class="snow" id="snow"></div>

<div class="container">

  <div class="logo">
    <img src="https://i.postimg.cc/ZK4x3VmK/IMG-20260501-233713-202.jpg">
  </div>

  <h2>Sharaf Uddin Official</h2>
  <div class="sub">🕌 Alhamdulillah Always</div>

  <div class="icons">

    <!-- Facebook -->
    <a class="icon" href="https://www.facebook.com/share/18YiVMfxsB/" target="_blank" onclick="playClick()">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
    </a>

    <!-- TikTok (app open) -->
    <a class="icon" href="https://www.tiktok.com/" target="_blank" onclick="playClick()">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
    </a>

    <!-- Telegram FIXED -->
    <a class="icon" href="https://t.me/Smart_Method_Owner" target="_blank" onclick="playClick()">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
    </a>

    <!-- Instagram -->
    <a class="icon" href="https://www.instagram.com/" target="_blank" onclick="playClick()">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
    </a>

  </div>

  <div class="icons">

    <a class="icon" href="https://t.me/+75BQ2Qw9UZI4OTM1" target="_blank" onclick="playClick()">
      <img src="https://i.postimg.cc/ZK4x3VmK/IMG-20260501-233713-202.jpg">
    </a>

    <a class="icon" href="https://t.me/Global_Method_Channel" target="_blank" onclick="playClick()">
      <img src="https://i.postimg.cc/7YK0z4Xb/IMG-20260501-233844-851.jpg">
    </a>

  </div>

  <div class="btn-row">
    <button class="btn" onclick="toggleMusic(); playClick()">🎵 Music</button>
    <button class="btn" id="timeBtn">⏰ Time</button>
  </div>

  <div class="bottom" id="typing"></div>

</div>

<script>

function playClick(){
  let c=document.getElementById("clickSound");
  c.currentTime=0;
  c.play().catch(()=>{});
}

/* ❄️ snow */
const snow=document.getElementById("snow");
setInterval(()=>{
  let s=document.createElement("span");
  s.innerHTML="❄️";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*2+1)+"s";
  snow.appendChild(s);
  setTimeout(()=>s.remove(),4000);
},60);

/* 🎵 music */
let music=document.getElementById("bgmusic");
let isPlaying=false;

function toggleMusic(){
  if(!isPlaying){
    music.play().then(()=>isPlaying=true).catch(()=>{});
  }else{
    music.pause();
    isPlaying=false;
  }
}

/* 🔥 FIX: auto play on first click anywhere */
document.addEventListener("click", function(){
  if(!isPlaying){
    music.play().then(()=>isPlaying=true).catch(()=>{});
  }
},{once:true});

/* ⏰ time */
function updateTime(){
  let now=new Date();
  document.getElementById("timeBtn").innerText="⏰ "+now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

/* typing */
let text = "👋 Hey Welcome to my Bio Website 🌐✨\n\n💙 My Name: Sharaf Uddin\n🎂 Age: 20+\n💼 Work: Forex & Binary Trading 📊💹\n🚀 Goal: Online Business & Financial Freedom 💰🔥\n\n🙏 Thanks for visiting 💙";

let i=0;
function type(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,35);
  }
}
type();

</script>

</body>
</html>
